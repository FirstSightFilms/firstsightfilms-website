<!-- Video Gallery Module
     Usage: This is a TEMPLATE showing the structure.

     For project pages, copy this structure into your page and replace
     the placeholder videos with your actual Vimeo/YouTube embeds.

     CSS classes defined in components.css:
     - .video-gallery (section wrapper)
     - .video-grid (responsive video grid)
     - .video-item (individual video container)
-->
<section class="video-gallery">
  <div class="container">
    <h2>Project Videos</h2>
    <div class="video-grid">
      <!-- Replace with Vimeo/YouTube embeds -->
      <div class="video-item">
        <iframe src="https://player.vimeo.com/video/YOUR_VIDEO_ID" frameborder="0" allow="autoplay; fullscreen" allowfullscreen loading="lazy"></iframe>
      </div>
      <div class="video-item">
        <iframe src="https://player.vimeo.com/video/YOUR_VIDEO_ID" frameborder="0" allow="autoplay; fullscreen" allowfullscreen loading="lazy"></iframe>
      </div>
      <!-- Add more videos as needed -->
    </div>
  </div>
</section>
