<section class="hero hero-split">
  <div class="hero-text">
    <p class="hero-script">First Sight Films</p>
    <h1 class="hero-title">{{hero-h1}}</h1>
    <p class="hero-tagline">{{hero-tagline}}</p>
    <div class="hero-photo-mobile">
      {{hero-media-mobile}}
    </div>
    <p class="hero-desc"><strong>{{hero-description}}</strong></p>
    {{hero-description2}}
    {{hero-cta}}
    <div class="hero-stats">
      <div class="stat"><span class="stat-number">10+</span><span class="stat-label">Years</span></div>
      <div class="stat"><span class="stat-number">100+</span><span class="stat-label">Projects</span></div>
      <div class="stat"><span class="stat-number">5&#9733;</span><span class="stat-label">Rating</span></div>
      <div class="stat"><span class="stat-number">50+</span><span class="stat-label">Reviews</span></div>
    </div>
  </div>
  <div class="hero-photo">
    {{hero-media}}
  </div>
</section>
