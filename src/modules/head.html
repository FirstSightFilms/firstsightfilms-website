<!-- Critical CSS (inline for faster FCP/LCP) -->
<style>
:root{--color-black:#000;--color-white:#fff;--color-gray-100:#f5f5f5;--color-gray-200:#eee;--color-gray-300:#ddd;--color-gray-500:#666;--color-gray-700:#333;--color-accent:#f4c057;--font-primary:'Roboto',-apple-system,BlinkMacSystemFont,sans-serif;--font-heading:'Poppins',var(--font-primary);--spacing-xs:0.5rem;--spacing-sm:1rem;--spacing-md:2rem;--spacing-lg:4rem;--spacing-xl:6rem;--max-width:1200px;--container-padding:2rem}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}body{font-family:var(--font-primary);font-size:1rem;line-height:1.6;color:var(--color-gray-700);background:var(--color-white);-webkit-font-smoothing:antialiased;padding-top:120px}
h1,h2,h3,h4,h5,h6{font-family:var(--font-heading);font-weight:600;line-height:1.2;color:var(--color-black)}
h1{font-size:2.5rem}h2{font-size:2rem}img{max-width:100%;height:auto;display:block}
.site-header{position:fixed;top:0;left:0;right:0;background:#fff;border-bottom:1px solid #eee;z-index:1000}
.header-content{display:flex;align-items:center;justify-content:center;max-width:1400px;margin:0 auto;padding:0.5rem 2rem;position:relative}
.branding{flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.branding .logo img{display:block;height:70px;width:auto}
.hero{position:relative;background:rgba(244,192,87,0.10);color:var(--color-black)}
.hero-split{display:grid;grid-template-columns:1fr 1fr;min-height:80vh;align-items:center;gap:var(--spacing-lg);max-width:var(--max-width);margin:0 auto;padding:var(--spacing-lg) var(--container-padding)}
.hero-text{text-align:left}
.hero-photo-mobile{display:none}
@media(max-width:768px){:root{--container-padding:1rem}h1{font-size:2rem}h2{font-size:1.5rem}body{padding-top:100px}.header-content{padding:0.75rem 1rem}.branding .logo img{height:63px}.hero-split{grid-template-columns:1fr;text-align:center;min-height:auto;padding:var(--spacing-md) var(--container-padding)}.hero-text{text-align:center}.hero-photo{display:none}.hero-photo-mobile{display:block;margin:var(--spacing-sm) auto;max-width:280px;position:relative}}
</style>
