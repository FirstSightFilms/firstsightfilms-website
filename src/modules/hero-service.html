<!-- Service Hero Section -->
<section class="service-hero">
  <div class="service-hero-content">
    <p class="service-hero-label">{{hero-label}}</p>
    <h1>{{hero-h1}}</h1>
    <p class="service-hero-tagline">{{hero-tagline}}</p>
    <p class="service-hero-desc">{{hero-description}}</p>
    {{hero-cta}}
  </div>
</section>

<!-- Credibility Section -->
<section class="section-credibility">
  <div class="credibility-grid">
    <div class="credibility-item">
      <span class="credibility-number">10+</span>
      <span class="credibility-label">Years</span>
    </div>
    <div class="credibility-item">
      <span class="credibility-number">1k+</span>
      <span class="credibility-label">Projects</span>
    </div>
    <div class="credibility-item">
      <span class="credibility-number">5.0</span>
      <span class="credibility-label">Rating</span>
    </div>
    <div class="credibility-item">
      <span class="credibility-number">50+</span>
      <span class="credibility-label">Reviews</span>
    </div>
  </div>
</section>
