<!DOCTYPE html>
<html lang="en">
<head>
{{head}}
<title>Contact Us | First Sight Films - St. Augustine Video Production</title>
<meta name="description" content="Contact First Sight Films for video production in St. Augustine, FL. Get a free consultation for corporate videos, event coverage, or social media content.">
</head>
<body class="page-contact">

{{header}}

<main>

  <!-- Hero Section -->
  <section class="contact-hero">
    <div class="contact-hero-bg">
      <img src="/images/First-Sight-Films-Event-Photography-St-Augustine-Amphitheatre-Revivalist-1.JPG" alt="First Sight Films event photography" loading="eager">
      <div class="contact-hero-overlay"></div>
    </div>
    <div class="contact-hero-content">
      <h1>Let's Chat</h1>
      <div class="contact-hero-divider"></div>
      <h2>What project can we help you with?</h2>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="section-contact">
    <div class="container">
      <div class="contact-container">

        <div class="contact-sidebar">
          <div class="contact-info-box">
            <h4>Get in Touch</h4>
            <p><strong>Phone:</strong><br><a href="tel:+19542947868">(954) 294-7868</a></p>
            <p><strong>Email:</strong><br><a href="mailto:info@firstsightfilms.com">info@firstsightfilms.com</a></p>
            <div class="contact-social">
              <strong>Follow Us:</strong>
              <div class="contact-social-icons">
                <a href="https://www.instagram.com/firstsightfilms/" aria-label="Instagram" target="_blank" rel="noopener">
                  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="contact-form-wrapper">
          <form name="contact" class="contact-form" method="POST" data-netlify="true" netlify-honeypot="bot-field">
            <input type="hidden" name="form-name" value="contact">
            <p style="display:none"><label>Don't fill this out: <input name="bot-field"></label></p>
            <div class="form-row">
              <div class="form-group">
                <label for="name">Your Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required>
              </div>
              <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="phone">Phone Number <span class="label-hint">(in case email doesn't work)</span></label>
                <input type="tel" id="phone" name="phone">
              </div>
              <div class="form-group">
                <label for="referral">How did you hear about us?</label>
                <input type="text" id="referral" name="referral">
              </div>
            </div>
            <div class="form-group">
              <label for="message">Your Message</label>
              <textarea id="message" name="message" rows="5" placeholder="Tell us about your project and what you're looking for..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

</main>

{{schema}}

{{footer}}

</body>
</html>
